<!doctype html>
<!--
  share template — A/B choice. A self-contained page: the agent fills the two
  option cards (text and/or an uploaded image URL), the person taps one, the pick
  posts home via share.submit(). Adapt freely; the only contract is the submit call.

  Images: don't inline base64. Upload each with `curl -X PUT … /api/assets/<name>`
  and drop the returned URL into the <img src>.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pick a direction</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         background: #f5f6f8; color: #1e293b; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 20px; color: #0f2742; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 14px; margin-bottom: 20px; }
  .opts { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
  @media (max-width: 560px) { .opts { grid-template-columns: 1fr; } }
  .opt { background: #fff; border: 2px solid #e8ebf0; border-radius: 14px; overflow: hidden;
         cursor: pointer; transition: border-color .12s, transform .06s; text-align: left; }
  .opt:hover { border-color: #94a3b8; }
  .opt:active { transform: scale(.99); }
  .opt img { width: 100%; height: 180px; object-fit: cover; display: block; background: #eef2f7; }
  .opt .body { padding: 14px 16px; }
  .opt .t { font-weight: 700; color: #0f2742; margin-bottom: 4px; }
  .opt .d { font-size: 13.5px; color: #475569; line-height: 1.45; }
  .done { display: none; text-align: center; padding: 40px 0; color: #15803d; font-weight: 600; }
  .foot { margin-top: 18px; font-size: 12.5px; color: #94a3b8; text-align: center; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>SHORT TITLE — the choice, as a question</h1>
    <div class="sub">one line of context</div>

    <div class="opts" id="opts">
      <button class="opt" data-choice="A">
        <img src="" alt="Option A" onerror="this.style.display='none'">
        <div class="body"><div class="t">Option A</div><div class="d">one line on what this is</div></div>
      </button>
      <button class="opt" data-choice="B">
        <img src="" alt="Option B" onerror="this.style.display='none'">
        <div class="body"><div class="t">Option B</div><div class="d">one line on what this is</div></div>
      </button>
    </div>

    <div class="done" id="done">✓ Got it — thanks, that's been sent back.</div>
    <div class="foot">Tap the one you prefer.</div>
  </div>

  <script src="/share.js"></script>
  <script>
    document.getElementById('opts').addEventListener('click', function (e) {
      var btn = e.target.closest('.opt'); if (!btn) return;
      share.submit({ choice: btn.dataset.choice }).then(function () {
        document.getElementById('opts').style.display = 'none';
        document.getElementById('done').style.display = 'block';
      });
    });
  </script>
</body>
</html>
