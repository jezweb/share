<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mark it up</title>
<!--
  annotate — tap an image to drop pins; click a pin (or its list row) to EDIT or
  DELETE it. You write no interaction code: include share.js + share-ui.js and
  drop a <div data-share-annotate data-src="..."> in. The component reports the
  full current pin set via share.submit({kind:'annotate', pins:[...]}) on every
  change, so the latest response is always the current state.

  Swap IMAGE_SRC for your image path (push it alongside this page, e.g.
  img/mockup.png). That's the whole page.
-->
<style>
  body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0f1320;color:#e7ecf5;margin:0}
  .wrap{max-width:860px;margin:0 auto;padding:22px 16px 60px}
  h1{font-size:21px;color:#fff;margin:0 0 4px}
  .sub{color:#9aa6bd;font-size:14px;margin-bottom:18px}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Tap the bits that need a change</h1>
    <div class="sub">Click the image to drop a pin and leave a note. Click any pin to edit or delete it.</div>
    <div data-share-annotate data-src="IMAGE_SRC"></div>
  </div>

  <script src="/share.js"></script>
  <script src="/share-ui.js"></script>
</body>
</html>
